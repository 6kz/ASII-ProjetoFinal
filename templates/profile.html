{% extends 'base.html' %}
{% block content %}
<div class="bg-gradient-to-r from-blue-500 to-indigo-600 text-white p-6 rounded-lg shadow-md mb-6">
    <h2 class="text-2xl font-bold">Perfil de @{{ profile_user.username }}</h2>
    <p class="text-sm opacity-80 mt-1">Total de publicações: {{ posts.count }}</p>
</div>

<h3 class="text-lg font-bold mb-4 text-gray-700">Histórico de Publicações</h3>
<div class="space-y-4">
    {% for post in posts %}
    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
        <p class="text-gray-700 text-lg">{{ post.conteudo }}</p>
        <div class="mt-4 text-xs text-gray-400 flex justify-between">
            <span>{{ post.criado_em|date:"d/m/Y H:i" }}</span>
            <a href="{% url 'post_detail' post.id %}" class="text-blue-500 hover:underline">Ver discussão</a>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
